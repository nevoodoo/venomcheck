name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: pip install pytest ruff

      - name: Lint
        run: ruff check venomcheck/ tests/

      - name: Test
        run: pytest tests/ -v

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-creatordate | grep '^v' | sed -n '2p' || echo "")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV="${{ steps.prev_tag.outputs.tag }}"

          if [ -z "$PREV" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "$TAG")
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV}..${TAG}")
          fi

          echo "$LOG" > /tmp/changelog.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/changelog.md
